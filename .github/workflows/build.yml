name: Build s9pk

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq squashfs-tools squashfs-tools-ng

      - name: Install start-cli
        run: |
          sudo curl -fsSL -o /usr/local/bin/start-cli \
            https://github.com/Start9Labs/start-os/releases/download/v0.4.0-beta.9/start-cli_x86_64-linux
          sudo chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Set up signing key
        run: |
          mkdir -p ~/.startos
          echo "${{ secrets.REGISTRY_ADMIN_KEY }}" | base64 -d > ~/.startos/developer.key.pem
          chmod 600 ~/.startos/developer.key.pem

      - name: Install npm deps & build
        run: npm ci && npm run build

      - name: Build s9pk
        run: start-cli s9pk pack -o cognee_x86_64.s9pk --arch x86_64 --no-assets

      - name: Upload s9pk
        uses: actions/upload-artifact@v4
        with:
          name: cognee-s9pk
          path: cognee_x86_64.s9pk
