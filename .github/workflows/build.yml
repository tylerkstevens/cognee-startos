name: Build s9pk

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools squashfs-tools-ng

      - name: Download start-cli v1.0.0
        run: |
          curl -fsSL -o start-cli https://github.com/Start9Labs/start-os/releases/download/start-cli/v1.0.0/start-cli_x86_64-linux
          chmod +x start-cli
          ./start-cli --version

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Init developer key
        run: ./start-cli init-key

      - name: Debug - show ingredients
        run: ./start-cli s9pk list-ingredients 2>&1 || true

      - name: Build s9pk (with verbose output)
        id: build
        run: |
          set +e
          ./start-cli s9pk pack -o cognee_x86_64.s9pk --arch x86_64 2>&1 | tee /tmp/build.log
          EXIT_CODE=***  echo "exit_code=***" >> "$GITHUB_OUTPUT"
          echo "=== Build output ==="
          cat /tmp/build.log

      - name: Show manifest (if built)
        if: success()
        run: ./start-cli s9pk inspect cognee_x86_64.s9pk manifest

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cognee-s9pk
          path: cognee_x86_64.s9pk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
