name: Build and Release s9pk

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq squashfs-tools squashfs-tools-ng

      - name: Install start-cli
        run: |
          sudo curl -fsSL -o /usr/local/bin/start-cli \
            https://github.com/Start9Labs/start-os/releases/download/v0.4.0-beta.9/start-cli_x86_64-linux
          sudo chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Set up signing key
        run: |
          mkdir -p ~/.startos
          printf '%s' "$REGISTRY_ADMIN_KEY" | base64 -d > ~/.startos/developer.key.pem
          chmod 600 ~/.startos/developer.key.pem
        env:
          REGISTRY_ADMIN_KEY: ${{ secrets.REGISTRY_ADMIN_KEY }}

      - name: Install npm deps & build
        run: npm ci && npm run build

      - name: Docker debug
        run: |
          docker version
          docker info 2>&1 | head -5
          docker build -t test-frontend ./frontend 2>&1 | tail -20

      - name: Build s9pk
        run: start-cli s9pk pack -o cognee_x86_64.s9pk --arch x86_64 --no-assets

      - name: Get package version
        id: ver
        run: echo "version=$(node -e 'console.log(require(\"./package.json\").version)')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cognee ${{ steps.ver.outputs.version }} (build ${{ github.run_number }})"
          tag_name: "build-${{ github.run_number }}"
          files: cognee_x86_64.s9pk
          fail_on_unmatched_files: true
