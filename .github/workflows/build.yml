name: Build s9pk

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install squashfs-tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq squashfs-tools-ng

      - name: Download start-cli
        run: |
          curl -fsSL -o start-cli https://github.com/Start9Labs/start-os/releases/download/v0.4.0-beta.9/start-cli_x86_64-linux
          chmod +x start-cli
          ./start-cli --version

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Init developer key
        run: ./start-cli init-key

      - name: Build s9pk
        run: ./start-cli s9pk pack -o cognee_x86_64.s9pk --arch x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognee-s9pk
          path: cognee_x86_64.s9pk
