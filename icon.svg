<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="26" y1="26" x2="486" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Brain/neural network shape -->
  <g transform="translate(256,240)" fill="none" stroke="#00d4aa" stroke-width="8" stroke-linecap="round">
    <!-- Main brain outline -->
    <path d="M-80,-10 C-80,-80 -40,-120 0,-120 C40,-120 80,-80 80,-10 C80,40 40,80 0,80 C-40,80 -80,40 -80,-10Z" stroke-width="10"/>
    <!-- Neural connections -->
    <circle cx="0" cy="-40" r="8" fill="#00d4aa"/>
    <circle cx="-40" cy="10" r="6" fill="#00d4aa"/>
    <circle cx="40" cy="10" r="6" fill="#00d4aa"/>
    <circle cx="0" cy="50" r="5" fill="#00d4aa"/>
    <line x1="0" y1="-40" x2="-40" y2="10" stroke-width="4"/>
    <line x1="0" y1="-40" x2="40" y2="10" stroke-width="4"/>
    <line x1="-40" y1="10" x2="0" y2="50" stroke-width="4"/>
    <line x1="40" y1="10" x2="0" y2="50" stroke-width="4"/>
    <!-- External connections -->
    <line x1="-80" y1="-10" x2="-130" y2="-30" stroke-width="5"/>
    <line x1="-80" y1="10" x2="-120" y2="40" stroke-width="5"/>
    <line x1="80" y1="-10" x2="130" y2="-30" stroke-width="5"/>
    <line x1="80" y1="10" x2="120" y2="40" stroke-width="5"/>
  </g>
  <!-- Cognee text -->
  <text x="256" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="700" fill="#00d4aa">cognee</text>
</svg>
