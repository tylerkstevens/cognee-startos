<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="26" y1="26" x2="486" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00d4aa"/>
      <stop offset="1" stop-color="#00b894"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Knowledge graph: 7 nodes with edges -->
  <g transform="translate(256, 230)" stroke="#00d4aa" stroke-width="3" stroke-linecap="round" opacity="0.35">
    <!-- Edges -- all connections between nodes -->
    <line x1="0" y1="-95" x2="-105" y2="-30"/>
    <line x1="0" y1="-95" x2="105" y2="-30"/>
    <line x1="0" y1="-95" x2="90" y2="60"/>
    <line x1="0" y1="-95" x2="-90" y2="60"/>
    <line x1="-105" y1="-30" x2="105" y2="-30"/>
    <line x1="-105" y1="-30" x2="-90" y2="60"/>
    <line x1="-105" y1="-30" x2="0" y2="95"/>
    <line x1="105" y1="-30" x2="90" y2="60"/>
    <line x1="105" y1="-30" x2="0" y2="95"/>
    <line x1="-90" y1="60" x2="90" y2="60"/>
    <line x1="-90" y1="60" x2="0" y2="95"/>
    <line x1="90" y1="60" x2="0" y2="95"/>
  </g>

  <!-- Nodes (circles) -->
  <g filter="url(#glow)">
    <!-- Center node -->
    <circle cx="256" cy="135" r="18" fill="url(#node)" stroke="#00d4aa" stroke-width="2"/>
    <!-- Top-left -->
    <circle cx="151" cy="200" r="12" fill="#0d1117" stroke="#00d4aa" stroke-width="2"/>
    <!-- Top-right -->
    <circle cx="361" cy="200" r="12" fill="#0d1117" stroke="#00d4aa" stroke-width="2"/>
    <!-- Left -->
    <circle cx="166" cy="290" r="10" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Right -->
    <circle cx="346" cy="290" r="10" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Bottom -->
    <circle cx="256" cy="325" r="14" fill="#0d1117" stroke="#00d4aa" stroke-width="2"/>
    <!-- Bottom-left -->
    <circle cx="206" cy="260" r="8" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
    <!-- Bottom-right -->
    <circle cx="306" cy="260" r="8" fill="#0d1117" stroke="#00d4aa" stroke-width="1.5"/>
  </g>

  <!-- Text -->
  <text x="256" y="425" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="#e6edf3" letter-spacing="3">cognee</text>

  <!-- Sub-text: "memory" -->
  <text x="256" y="455" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="400" fill="#8b949e" letter-spacing="4">AI MEMORY PLATFORM</text>
</svg>
